<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon1.png">

  <title>Doctor Appointments</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 10px;
    }

    .app-header {
      background-color: #4CAF50;
      color: white;
      padding: 15px;
      font-size: 20px;
      text-align: center;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .add-btn {
      background-color: #4CAF50;
      color: white;
      width: 100%;
      margin-top: 10px;
      font-weight: bold;
    }

    #list {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="app-header">🩺 Doctor Appointment</div>

<div class="container">

  <div class="card">
    <input type="text" id="name" placeholder="Patient Name">

    <label>📅 Date</label>
    <input type="date" id="date">

    <label>🕒 Time</label>
    <input type="time" id="time">

    <input type="number" id="reminder" placeholder="Reminder (minutes before)">

    <button class="add-btn" onclick="addAppointment()">Add Appointment</button>
  </div>

  <div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAto1rStOr4AqGRCT7aw0d_zh-BdRmA9MM",
  authDomain: "doctor-app-b5f5d.firebaseapp.com",
  projectId: "doctor-app-b5f5d",
  storageBucket: "doctor-app-b5f5d.firebasestorage.app",
  messagingSenderId: "217908180939",
  appId: "1:217908180939:web:7645d7bddc2d59c868e84e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

console.log("Firebase connected ✔");

// ADD APPOINTMENT
function addAppointment() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const reminder = document.getElementById("reminder").value;

  if (!name || !date || !time) {
    alert("Please fill all fields");
    return;
  }

  db.collection("appointments").add({
    name,
    date,
    time,
    reminder,
    createdAt: new Date()
  })
  .then(() => {
    alert("Appointment saved ✔");

    document.getElementById("name").value = "";
    document.getElementById("date").value = "";
    document.getElementById("time").value = "";
    document.getElementById("reminder").value = "";
  })
  .catch(err => {
    console.error(err);
    alert("Error saving appointment ❌");
  });
}

// REAL-TIME LISTENER (THIS FIXES REFRESH ISSUE)
function renderAppointments() {
  const list = document.getElementById("list");

  db.collection("appointments")
    .orderBy("createdAt", "desc")
    .onSnapshot((snapshot) => {

      list.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${data.name}</b><br>
          📅 ${data.date} | 🕒 ${data.time}<br>
          ⏰ Reminder: ${data.reminder || 0} min
        `;

        list.appendChild(div);
      });

    }, (error) => {
      console.error("Firestore error:", error);
    });
}

// INIT APP
renderAppointments();

</script>

</body>
</html>
