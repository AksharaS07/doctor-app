<script>
let editIndex = -1;

function addAppointment() {
  let name = document.getElementById("name").value;
  let date = document.getElementById("date").value;
  let time = document.getElementById("time").value;
  let reminder = document.getElementById("reminder").value;

  if (!name || !date || !time) {
    alert("Please fill all fields");
    return;
  }
  // ❗ Prevent past time for today
let now = new Date();
let selectedDateTime = new Date(`${date}T${time}`);

if (selectedDateTime < now) {
  alert("Cannot select past time!");
  return;
}

  let appointment = { name, date, time, reminder, notified: false };

addDoc(collection(db, "appointments"), {
  name: name,
  date: date,
  time: time,
  reminder: reminder,
  notified: false,
  createdAt: new Date()
})
.then(() => {
  alert("Appointment Saved ✅");
  loadAppointments();
  // clear fields
  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("time").value = "";
  document.getElementById("reminder").value = "";
  document.getElementById("formattedTime").innerText = "";
  document.getElementById("formattedDate").innerText = "";
})
.catch(err => console.log(err));
}

function loadAppointments() {
  const list = document.getElementById("list");

  onSnapshot(collection(db, "appointments"), (snapshot) => {
    list.innerHTML = "";

    snapshot.forEach((doc) => {
      const data = doc.data();

      const item = document.createElement("div");
      item.className = "card";
      item.innerText = data.name + " - " + data.date + " - " + data.time;

      list.appendChild(item);
    });
  });
}

function setMinDate() {
  let today = new Date().toISOString().split("T")[0];
  document.getElementById("date").setAttribute("min", today);
}

function formatTime(time) {
  let [hour, minute] = time.split(":");

  hour = parseInt(hour);

  let ampm = hour >= 12 ? "PM" : "AM";
  hour = hour % 12;
  hour = hour ? hour : 12; // 0 becomes 12

  return `${hour}:${minute} ${ampm}`;
}

function updateFormattedTime() {
  let time = document.getElementById("time").value;

  if (!time) return;

  document.getElementById("formattedTime").innerText =
  "🕒 " + formatTime(time);
}

function updateFormattedDate() {
  let date = document.getElementById("date").value;

  if (!date) return;

  let d = new Date(date);

  let formatted = d.toLocaleDateString("en-IN", {
    day: "numeric",
    month: "short",
    year: "numeric"
  });

  document.getElementById("formattedDate").innerText =
    "📅 " + formatted;
}
