<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Appointments</title>
<link rel="icon" href="icon1.png">

<style>
body { font-family: Arial; background:#f4f6f8; padding:10px; }
.app-header { background:#4CAF50; color:white; padding:15px; text-align:center; border-radius:10px; }
.container { max-width:400px; margin:auto; }
.card { background:white; padding:15px; border-radius:12px; margin-bottom:12px; }
input { width:100%; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #ccc; }
.add-btn { background:#4CAF50; color:white; width:100%; padding:12px; border:none; border-radius:8px; }
.date-heading { font-weight:bold; margin-top:15px; }
.preview { font-size:13px; color:#555; }
</style>
</head>

<body>

<div class="app-header">🩺 Doctor Appointment</div>

<div class="container">

<div class="card">
<input type="text" id="name" placeholder="Patient Name">

<label>📅 Date</label>
<input type="date" id="date" onchange="updateFormattedDate()">
<div id="formattedDate" class="preview"></div>

<label>🕒 Time</label>
<input type="time" id="time" onchange="updateFormattedTime()">
<div id="formattedTime" class="preview"></div>

<input type="number" id="reminder" placeholder="Reminder (minutes before)">

<button class="add-btn" onclick="addAppointment()">Add Appointment</button>
</div>

<div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAto1rStOr4AqGRCT7aw0d_zh-BdRmA9MM",
  authDomain: "doctor-app-b5f5d.firebaseapp.com",
  projectId: "doctor-app-b5f5d",
  storageBucket: "doctor-app-b5f5d.firebasestorage.app",
  messagingSenderId: "217908180939",
  appId: "1:217908180939:web:7645d7bddc2d59c868e84e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔔 Ask permission ONCE
if ("Notification" in window) {
  Notification.requestPermission();
}

let messaging = null;

if (firebase.messaging.isSupported()) {
  messaging = firebase.messaging();

  Notification.requestPermission().then(permission => {
    if (permission === "granted") {
      messaging.getToken({
        vapidKey: "BNd1NqL3KsFNQBv-_ln_jONWTQgm_6m-ItQh01FwstDYBLTLc7EMaBf_Tk8ROa7pzak9AUgMimA3ZlkyjEGI2CE"
      }).then(token => {
        console.log("🔥 DEVICE TOKEN:", token);

        // store token in Firestore (IMPORTANT)
        db.collection("deviceTokens").doc(token).set({
          createdAt: new Date()
        });

      }).catch(err => {
        console.log("Token error:", err);
      });
    }
  });
}

// 🔔 FOREGROUND NOTIFICATION HANDLER
if (messaging) {
  messaging.onMessage((payload) => {
    console.log("Foreground message received:", payload);
    
    // Force a local notification if the app is actively open
    if (Notification.permission === "granted") {
      new Notification(payload.notification.title, {
        body: payload.notification.body,
        icon: "icon1.png"
      });
    } else {
      // Fallback if notifications are blocked but they are looking at the screen
      alert(`${payload.notification.title}\n${payload.notification.body}`);
    }
  });
}

// INPUTS
const nameInput = document.getElementById("name");
const dateInput = document.getElementById("date");
const timeInput = document.getElementById("time");
const reminderInput = document.getElementById("reminder");
const formattedDateDiv = document.getElementById("formattedDate");
const formattedTimeDiv = document.getElementById("formattedTime");

let editId = null;

// ADD / UPDATE
async function addAppointment() {
  let name = nameInput.value;
  let date = dateInput.value;
  let time = timeInput.value;
  let reminder = parseInt(reminderInput.value || 0);

  if (!name || !date || !time) {
    alert("Fill all fields");
    return;
  }

  let now = new Date();
  let selected = new Date(`${date}T${time}`);
  let reminderTime = new Date(selected.getTime() - reminder * 60000);

if (reminderTime < now) {
  alert("Reminder time already passed ❌");
  return;
}

  if (selected < now) {
    alert("Cannot select past time");
    return;
  }

  let snapshot = await db.collection("appointments")
    .where("date","==",date)
    .where("time","==",time)
    .get();

  if (!snapshot.empty && !editId) {
    alert("Slot already booked ❌");
    return;
  }

  if (editId) {
    await db.collection("appointments").doc(editId).update({
  name,
  date,
  time,
  reminder,
  notificationStatus: "pending"
});
    editId = null;
  } else {
    await db.collection("appointments").add({
  name,
  date,
  time,
  reminder,
  createdAt: new Date(),
  notified: false,
  notificationStatus: "pending"
});
  }

  nameInput.value="";
  dateInput.value="";
  timeInput.value="";
  reminderInput.value="";
  formattedDateDiv.innerText="";
  formattedTimeDiv.innerText="";
}

// FORMAT
function formatTime(time){
  let [h,m]=time.split(":");
  h=parseInt(h);
  let ampm=h>=12?"PM":"AM";
  h=h%12||12;
  return `${h}:${m} ${ampm}`;
}

// PREVIEW
function updateFormattedTime(){
  if(!timeInput.value){ formattedTimeDiv.innerText=""; return;}
  formattedTimeDiv.innerText="🕒 "+formatTime(timeInput.value);
}

function updateFormattedDate(){
  if(!dateInput.value){ formattedDateDiv.innerText=""; return;}
  let d=new Date(dateInput.value);
  formattedDateDiv.innerText="📅 "+d.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
}

// DELETE
function deleteAppointment(id){
  db.collection("appointments").doc(id).delete();
}

// EDIT
function editAppointment(id,name,date,time,reminder){
  editId=id;
  nameInput.value=name;
  dateInput.value=date;
  timeInput.value=time;
  reminderInput.value=reminder;
  updateFormattedDate();
  updateFormattedTime();
}

// LIST
function renderAppointments(){
  const list=document.getElementById("list");

  db.collection("appointments")
  .orderBy("createdAt","desc")
  .onSnapshot(snapshot=>{

    list.innerHTML="";
    let grouped={};

    snapshot.forEach(doc=>{
      let data=doc.data();
      if(!grouped[data.date]) grouped[data.date]=[];
      grouped[data.date].push({...data,id:doc.id});
    });

    Object.keys(grouped).sort().forEach(date=>{

      let d=new Date(date);
      let formattedDate=d.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});

      list.innerHTML+=`<div class="date-heading">📅 ${formattedDate}</div>`;

      grouped[date]
      .sort((a,b)=>new Date(`${a.date}T${a.time}`)-new Date(`${b.date}T${b.time}`))
      .forEach(item=>{
        list.innerHTML+=`
        <div class="card">
          <strong>${item.name}</strong><br>
          Time: ${formatTime(item.time)}<br>
          ⏰ Reminder: ${item.reminder} min<br><br>

          <button onclick="editAppointment('${item.id}','${item.name}','${item.date}','${item.time}','${item.reminder}')">Edit</button>
          <button onclick="deleteAppointment('${item.id}')">Delete</button>
        </div>`;
      });
    });
  });
}

function cleanOldAppointments() {
  let now = new Date();

  db.collection("appointments").get().then(snapshot => {
    snapshot.forEach(doc => {
      let data = doc.data();

      let appointmentTime = new Date(`${data.date}T${data.time}`);

      // 🧠 Add 5 minute buffer (important)
      let bufferTime = new Date(appointmentTime.getTime() + 5 * 60000);

      if (bufferTime < now) {
        db.collection("appointments").doc(doc.id).delete();
      }
    });
  });
}


// INIT
function setMinDate(){
  let today=new Date().toISOString().split("T")[0];
  dateInput.setAttribute("min",today);
}

renderAppointments();
cleanOldAppointments();
setInterval(cleanOldAppointments,60000); // every 1 min
setMinDate();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('firebase-messaging-sw.js')
    .then(function(registration) {
      console.log('Service Worker registered ✔', registration);
    })
    .catch(function(error) {
      console.log('Service Worker failed ❌', error);
    });
}

</script>

</body>
</html>
